# ============================================================================
# Feast CD - Deploy Features to Production
# ============================================================================
# Trigger: Push to main (after PR merge)
# Jobs: validate → secrets → deploy
# ============================================================================

name: "Feast CD"

on:
  push:
    branches: [main]
    paths:
      - "feast_repo/**"

env:
  POSTGRES_USER: ${{ secrets.FEAST_POSTGRES_USER }}
  POSTGRES_PASSWORD: ${{ secrets.FEAST_POSTGRES_PASSWORD }}
  FEAST_POSTGRES_HOST: ${{ secrets.FEAST_POSTGRES_HOST }}
  FEAST_POSTGRES_PORT: ${{ secrets.FEAST_POSTGRES_PORT }}
  FEAST_POSTGRES_DB: ${{ secrets.FEAST_POSTGRES_DB }}
  FEAST_REDIS_HOST: ${{ secrets.FEAST_REDIS_HOST }}
  FEAST_REDIS_PORT: ${{ secrets.FEAST_REDIS_PORT }}
  FEAST_REDIS_KEY: ${{ secrets.FEAST_REDIS_KEY }}
  AZURE_STORAGE_ACCOUNT_NAME: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
  AZURE_STORAGE_ACCOUNT_KEY: ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}

jobs:
  validate:
    name: "Validate Features"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install "feast[redis,postgres]" pytest pyyaml

      - name: Validate Python syntax
        run: |
          python << 'PYTHON_SCRIPT'
          import ast
          import sys
          import glob
          
          errors = 0
          for filepath in glob.glob('feast_repo/*.py'):
              try:
                  with open(filepath) as f:
                      ast.parse(f.read())
              except SyntaxError as e:
                  print(f"ERROR: {filepath}: {e}")
                  errors += 1
          
          sys.exit(errors)
          PYTHON_SCRIPT

      - name: Validate file structure
        run: |
          python << 'PYTHON_SCRIPT'
          import os
          import sys
          
          required_files = [
              'feast_repo/feature_store.yaml',
              'feast_repo/entities.py',
              'feast_repo/sources.py',
              'feast_repo/feature_views.py',
              'feast_repo/feature_services.py'
          ]
          
          missing = [f for f in required_files if not os.path.exists(f)]
          if missing:
              for f in missing:
                  print(f"ERROR: Missing file: {f}")
              sys.exit(1)
          PYTHON_SCRIPT

      - name: Run tests
        run: pytest tests/test_features.py -v 2>&1 || true

  secrets:
    name: "Validate Secrets"
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check PostgreSQL credentials
        run: |
          [ -z "${{ secrets.FEAST_POSTGRES_HOST }}" ] && echo "ERROR: FEAST_POSTGRES_HOST not set" && exit 1
          [ -z "${{ secrets.FEAST_POSTGRES_USER }}" ] && echo "ERROR: FEAST_POSTGRES_USER not set" && exit 1
          [ -z "${{ secrets.FEAST_POSTGRES_PASSWORD }}" ] && echo "ERROR: FEAST_POSTGRES_PASSWORD not set" && exit 1
          [ -z "${{ secrets.FEAST_POSTGRES_PORT }}" ] && echo "ERROR: FEAST_POSTGRES_PORT not set" && exit 1
          [ -z "${{ secrets.FEAST_POSTGRES_DB }}" ] && echo "ERROR: FEAST_POSTGRES_DB not set" && exit 1
          echo "PostgreSQL credentials: OK"

      - name: Check Redis credentials
        run: |
          [ -z "${{ secrets.FEAST_REDIS_HOST }}" ] && echo "ERROR: FEAST_REDIS_HOST not set" && exit 1
          [ -z "${{ secrets.FEAST_REDIS_PORT }}" ] && echo "ERROR: FEAST_REDIS_PORT not set" && exit 1
          [ -z "${{ secrets.FEAST_REDIS_KEY }}" ] && echo "ERROR: FEAST_REDIS_KEY not set" && exit 1
          echo "Redis credentials: OK"

      - name: Check Azure credentials
        run: |
          [ -z "${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}" ] && echo "ERROR: AZURE_STORAGE_ACCOUNT_NAME not set" && exit 1
          [ -z "${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}" ] && echo "ERROR: AZURE_STORAGE_ACCOUNT_KEY not set" && exit 1
          echo "Azure credentials: OK"

  deploy:
    name: "Deploy Features"
    needs: secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install "feast[redis,postgres]" psycopg2-binary adlfs azure-storage-blob

      - name: Sync data from Azure Blob
        run: python scripts/sync_from_blob.py

      - name: Initialize Feast registry
        working-directory: feast_repo
        run: |
          python << 'PYTHON_SCRIPT'
          import os
          from sqlalchemy import create_engine, text
          from feast import FeatureStore
          
          conn_str = (
              f"postgresql+psycopg2://"
              f"{os.getenv('POSTGRES_USER')}:"
              f"{os.getenv('POSTGRES_PASSWORD')}@"
              f"{os.getenv('FEAST_POSTGRES_HOST')}:"
              f"{os.getenv('FEAST_POSTGRES_PORT')}/"
              f"{os.getenv('FEAST_POSTGRES_DB')}?sslmode=require"
          )
          
          print("Initializing Feast registry...")
          engine = create_engine(conn_str, echo=False)
          with engine.connect() as conn:
              conn.execute(text("SELECT 1"))
          
          store = FeatureStore('.')
          print("Registry initialized successfully")
          PYTHON_SCRIPT

      - name: Apply features
        working-directory: feast_repo
        run: |
          python << 'PYTHON_SCRIPT'
          import os
          from feast import FeatureStore
          from entities import celda
          from feature_views import metricas_rf_fv, metricas_throughput_fv
          from feature_services import interferencia_4g_service, rf_analysis_service
          
          print("Applying features to registry...")
          
          store = FeatureStore('.')
          features = [
              celda,
              metricas_rf_fv,
              metricas_throughput_fv,
              interferencia_4g_service,
              rf_analysis_service
          ]
          store.apply(features)
          
          print("Features applied successfully")
          print("\nRegistered features:")
          for fv in store.list_feature_views():
              print(f"  - {fv.name}")
          
          print("\nRegistered services:")
          for fs in store.list_feature_services():
              print(f"  - {fs.name}")
          PYTHON_SCRIPT

      - name: Verify registry integrity
        working-directory: feast_repo
        run: |
          python << 'PYTHON_SCRIPT'
          from feast import FeatureStore
          
          print("Verifying registry integrity...")
          store = FeatureStore('.')
          
          entities_count = len(list(store.list_entities()))
          views_count = len(list(store.list_feature_views()))
          services_count = len(list(store.list_feature_services()))
          
          print(f"Entities: {entities_count}")
          print(f"Feature Views: {views_count}")
          print(f"Services: {services_count}")
          print("Registry verification completed")
          PYTHON_SCRIPT

      - name: Report on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Feast CD deployment failed - ${context.sha.slice(0, 7)}`,
              body: `Deployment failed for commit ${context.sha.slice(0, 7)}\n\nView logs: ${runUrl}`,
              labels: ['feast', 'deployment', 'error']
            });
