name: "Build Feast image"

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile.feast"
      - "scripts/feast_materialize.py"
      - "feast_repo/**"
  workflow_dispatch:

jobs:
  build:
    name: Build & push to ACR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.feast
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/feast-materialize:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/feast-materialize:latest