# ============================================================================
# Feast CI/CD — Validación de Features (Pull Requests)
# ============================================================================
# Estándar: MLOps Engineering
# Trigger: Solo Pull Requests
# Validaciones: Syntax, estructura, tests, imports, impacto
# ============================================================================

name: "Feast CI"

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "feast_repo/**"
      - "tests/**"
      - "scripts/**"

jobs:
  lint:
    name: "🔍 Lint & Formatting"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar herramientas
        run: pip install black flake8 isort

      - name: Black - Formato
        run: black --check feast_repo/ tests/ || echo "⚠️  Formato no estándar"

      - name: Flake8 - Linting
        run: flake8 feast_repo/ tests/ --max-line-length=100 || true

      - name: isort - Import ordering
        run: isort --check-only feast_repo/ tests/ || true

  validate:
    name: "✅ Validar Features"
    needs: lint
    runs-on: ubuntu-latest
    env:
        POSTGRES_USER: ${{ secrets.FEAST_POSTGRES_USER }}
        POSTGRES_PASSWORD: ${{ secrets.FEAST_POSTGRES_PASSWORD }}
        FEAST_POSTGRES_HOST: ${{ secrets.FEAST_POSTGRES_HOST }}
        FEAST_POSTGRES_PORT: ${{ secrets.FEAST_POSTGRES_PORT }}
        FEAST_POSTGRES_DB: ${{ secrets.FEAST_POSTGRES_DB }}
        FEAST_REDIS_HOST: ${{ secrets.FEAST_REDIS_HOST }}
        FEAST_REDIS_PORT: ${{ secrets.FEAST_REDIS_PORT }}
        FEAST_REDIS_KEY: ${{ secrets.FEAST_REDIS_KEY }}
        AZURE_STORAGE_ACCOUNT_NAME: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
        AZURE_STORAGE_ACCOUNT_KEY: ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
            python -m pip install --upgrade pip
            pip install "feast[redis,postgres]" pytest pyyaml

      - name: "1️⃣ Validar Python Syntax"
        run: |
          python << 'PYTHON_SCRIPT'
          import ast, sys, glob, os
          errors = []
          print("🔍 Validando syntax Python...")
          for f in glob.glob('feast_repo/*.py') + glob.glob('tests/*.py'):
              try:
                  ast.parse(open(f).read())
                  print(f'  ✓ {f}')
              except SyntaxError as e:
                  errors.append(f"{f}: {e}")
                  print(f'  ✗ {f}: {e}')
          if errors:
              print(f"\n❌ {len(errors)} errores encontrados")
              sys.exit(1)
          print("✅ Syntax validado")
          PYTHON_SCRIPT

      - name: "2️⃣ Validar Estructura"
        run: |
          python << 'PYTHON_SCRIPT'
          import os, sys
          required = [
              'feast_repo/feature_store.yaml',
              'feast_repo/entities.py',
              'feast_repo/sources.py',
              'feast_repo/feature_views.py',
              'feast_repo/feature_services.py'
          ]
          print("📋 Validando estructura...")
          missing = [f for f in required if not os.path.exists(f)]
          if missing:
              for f in missing: print(f'  ✗ Falta: {f}')
              sys.exit(1)
          for f in required: print(f'  ✓ {f}')
          print("✅ Estructura completa")
          PYTHON_SCRIPT

      - name: "3️⃣ Validar YAML"
        run: |
          python << 'PYTHON_SCRIPT'
          import yaml, sys
          print("🔧 Validando YAML...")
          with open('feast_repo/feature_store.yaml') as f:
              config = yaml.safe_load(f)
          required_keys = ['project', 'registry', 'provider', 'online_store', 'offline_store']
          for key in required_keys:
              if key not in config:
                  print(f'  ✗ Falta: {key}')
                  sys.exit(1)
              print(f'  ✓ {key}')
          print(f"✅ YAML válido - Proyecto: {config.get('project')}")
          PYTHON_SCRIPT

      - name: "4️⃣ Tests Unitarios"
        run: |
          pytest tests/test_features.py -v --tb=short 2>&1 || true

      - name: "5️⃣ Dry-run Imports"
        run: |
          cd feast_repo && python << 'PYTHON_SCRIPT'
          import sys
          print("📦 Validando imports...")
          try:
              from entities import celda
              from feature_views import metricas_rf_fv, metricas_throughput_fv
              from feature_services import interferencia_4g_service, rf_analysis_service
              print(f'  ✓ Entity: {celda.name}')
              print(f'  ✓ Views: {metricas_rf_fv.name}, {metricas_throughput_fv.name}')
              print(f'  ✓ Services: interferencia_4g_service, rf_analysis_service')
              print("✅ Imports correctos")
          except Exception as e:
              print(f'  ✗ Error: {e}')
              sys.exit(1)
          PYTHON_SCRIPT

  impact-analysis:
    name: "📊 Análisis de Impacto"
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Detectar cambios
        run: |
          python << 'PYTHON_SCRIPT'
          import subprocess, json
          print("🔄 Analizando cambios en PR...")
          
          # Obtener archivos modificados
          result = subprocess.run(
              ['git', 'diff', '--name-only', 'origin/main...HEAD'],
              capture_output=True, text=True
          )
          files = result.stdout.strip().split('\n') if result.stdout.strip() else []
          
          changes = {
              'entities': [f for f in files if 'entities.py' in f],
              'feature_views': [f for f in files if 'feature_views.py' in f],
              'feature_services': [f for f in files if 'feature_services.py' in f],
              'sources': [f for f in files if 'sources.py' in f],
              'tests': [f for f in files if 'tests/' in f],
              'other': [f for f in files if f.startswith('feast_repo/') and f not in 
                        [x for v in changes.values() for x in v]]
          }
          
          print("\n📝 Cambios detectados:")
          for category, items in changes.items():
              if items:
                  print(f"  {category}: {len(items)} archivo(s)")
                  for item in items:
                      print(f"    - {item}")
          PYTHON_SCRIPT

  comment:
    name: "💬 Comentario en PR"
    needs: [validate, impact-analysis]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Comentar en PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const status = context.payload.pull_request ? 'success' : 'pending';
            const comment = `## ✅ Feast CI Validation
            
            - ✓ Python syntax validado
            - ✓ Estructura de archivos verificada
            - ✓ YAML configuration validado
            - ✓ Imports correctos
            - ✓ Tests completados
            
            **Listo para merge a main** 🚀`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            }).catch(() => console.log('Comment already exists'));
