project: interferencia_4g_v2
provider: local

registry:
  registry_type: sql
  path: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${FEAST_POSTGRES_HOST}:${FEAST_POSTGRES_PORT}/${FEAST_POSTGRES_DB}?sslmode=require

offline_store:
  type: file

online_store:
  type: redis
  connection_string: ${FEAST_REDIS_HOST}:${FEAST_REDIS_PORT},password=${FEAST_REDIS_KEY},ssl=true,db=0

entity_key_serialization_version: 3